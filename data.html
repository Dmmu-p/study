<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <script>
        var arr=[{name:'苹果',price:5},{name:'香蕉',price:3}];
        console.log(arr);
        const arr_total=arr.map(arr=>arr.price*2);
        console.log(arr_total);
        const arr1=arr.filter(arr=>arr.price>4);
        console.log(arr1);
        const arr_name=arr.find(arr=>arr.name=="香蕉");
        console.log(arr_name);
    </script>
</body>
